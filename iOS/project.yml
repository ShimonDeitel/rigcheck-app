name: Rigcheck-VehicleInspection
options:
  bundleIdPrefix: com.shimondeitel.rigcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rigcheck-VehicleInspection:
    type: application
    platform: iOS
    sources:
      - path: Rigcheck-VehicleInspection
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rigcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rigcheck-VehicleInspection/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Rigcheck-VehicleInspectionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Rigcheck-VehicleInspectionTests
      - path: Rigcheck-VehicleInspection.storekit
    dependencies:
      - target: Rigcheck-VehicleInspection
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rigcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Rigcheck-VehicleInspectionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Rigcheck-VehicleInspectionUITests
    dependencies:
      - target: Rigcheck-VehicleInspection
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rigcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rigcheck-VehicleInspection:
    build:
      targets:
        Rigcheck-VehicleInspection: all
        Rigcheck-VehicleInspectionTests: [test]
        Rigcheck-VehicleInspectionUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rigcheck-VehicleInspection.storekit
    test:
      config: Debug
      storeKitConfiguration: Rigcheck-VehicleInspection.storekit
      targets:
        - Rigcheck-VehicleInspectionTests
        - Rigcheck-VehicleInspectionUITests
    archive:
      config: Release
